<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hawelha Telecom - تحليل الفواتير</title>
    <!-- مكتبة SheetJS لتصدير Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1a7e43; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        h1 { color: var(--primary); text-align: center; margin-bottom: 30px; }
        
        .upload-area { border: 2px dashed #ccc; padding: 40px; text-align: center; border-radius: 10px; cursor: pointer; transition: 0.3s; margin-bottom: 30px; }
        .upload-area:hover { border-color: var(--primary); background: #f0fdf4; }
        input[type="file"] { display: none; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th { background-color: var(--primary); color: white; padding: 12px; text-align: right; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 20px; }
        .btn:hover { background: #146435; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-box { background: #f0fdf4; padding: 15px; border-radius: 8px; text-align: center; border-right: 4px solid var(--primary); }
        .stat-val { font-size: 24px; font-weight: bold; color: var(--primary); display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 نظام تحليل فواتير Hawelha Telecom</h1>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <p style="font-size: 18px; margin: 0;">📂 اضغط هنا لرفع ملف PDF أو نصي (.txt)</p>
        <input type="file" id="fileInput" accept=".pdf,.txt" onchange="handleFile(this.files[0])">
    </div>

    <div id="resultsArea" style="display: none;">
        <div class="stats">
            <div class="stat-box"><span class="stat-val" id="totalLines">0</span>إجمالي الخطوط</div>
            <div class="stat-box"><span class="stat-val" id="totalFees">0</span>إجمالي الرسوم</div>
            <div class="stat-box"><span class="stat-val" id="totalTaxes">0</span>إجمالي الضرائب</div>
            <div class="stat-box"><span class="stat-val" id="grandTotal">0</span>الإجمالي الكلي</div>
        </div>

        <button class="btn" onclick="exportToExcel()">📥 تحميل تقرير Excel</button>
        
        <div style="overflow-x: auto; margin-top: 20px;">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>رقم المحمول</th>
                        <th>رسوم شهرية</th>
                        <th>خدمات</th>
                        <th>محلي مكالمات</th>
                        <th>محلي رسائل</th>
                        <th>محلي إنترنت</th>
                        <th>دولي مكالمات</th>
                        <th>دولي رسائل</th>
                        <th>تجوال مكالمات</th>
                        <th>تجوال رسائل</th>
                        <th>تجوال إنترنت</th>
                        <th>تسويات</th>
                        <th>ضرائب</th>
                        <th>الإجمالي</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let extractedData = [];

    async function handleFile(file) {
        if (!file) return;
        
        let textContent = "";
        
        if (file.type === "text/plain") {
            textContent = await file.text();
            processData(textContent);
        } else if (file.type === "application/pdf") {
            // ملاحظة: لقراءة PDF في المتصفح نحتاج لمكتبة pdf.js
            // للتبسيط هنا سنفترض أن المستخدم رفع ملف نصي مستخرج مسبقاً
            // أو يمكنك إضافة كود pdf.js هنا إذا أردت معالجة PDF مباشرة في المتصفح
            alert("لتحليل ملفات PDF مباشرة في المتصفح، يرجى استخدام ملف نصي (.txt) يحتوي على نفس البيانات، أو تفعيل مكتبة PDF.js");
        }
    }

    function processData(text) {
        const lines = text.split('\n');
        extractedData = [];
        let totalFees = 0, totalTaxes = 0, grandTotal = 0;

        // منطق الاستخراج بناءً على النمط الموجود في النص المرفق
        // يبحث عن السطر الذي يبدأ برقم هاتف ويتبعه القيم الرقمية
        
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            
            // البحث عن رقم موبايل مصري (01x xxxxxxxx)
            const phoneMatch = line.match(/01[0125]\d{8}/);
            
            if (phoneMatch && !line.includes("محمول")) { 
                // نتأكد إنه مش سطر عنوان "محمول 01..."
                const phone = phoneMatch[0];
                
                // استخراج الأرقام من نفس السطر
                const numbers = line.match(/\d+\.\d+|\d+/g)?.map(Number) || [];
                
                // التأكد من وجود بيانات كافية (عادة 13 عمود + الرقم)
                // في النص المرفق، الأرقام تأتي متكررة، نأخذ أول مجموعة فريدة
                if (numbers.length >= 13) {
                    // أخذ أول 13 قيمة رقمية بعد رقم الهاتف أو ضمن السياق
                    // بما أن النص مكرر، سنأخذ القيم الأولى التي تمثل البيانات الفعلية
                    const record = {
                        "رقم المحمول": phone,
                        "رسوم شهرية": numbers[0] || 0,
                        "خدمات": numbers[1] || 0,
                        "محلي مكالمات": numbers[2] || 0,
                        "محلي رسائل": numbers[3] || 0,
                        "محلي إنترنت": numbers[4] || 0,
                        "دولي مكالمات": numbers[5] || 0,
                        "دولي رسائل": numbers[6] || 0,
                        "تجوال مكالمات": numbers[7] || 0,
                        "تجوال رسائل": numbers[8] || 0,
                        "تجوال إنترنت": numbers[9] || 0,
                        "تسويات": numbers[10] || 0,
                        "ضرائب": numbers[11] || 0,
                        "الإجمالي": numbers[12] || 0
                    };

                    // تجنب التكرار لنفس الرقم في نفس الملف إذا تكرر السطر
                    const exists = extractedData.some(r => r["رقم المحمول"] === phone);
                    if (!exists) {
                        extractedData.push(record);
                        totalFees += record["رسوم شهرية"];
                        totalTaxes += record["ضرائب"];
                        grandTotal += record["الإجمالي"];
                    }
                }
            }
        }

        updateUI();
    }

    function updateUI() {
        document.getElementById('resultsArea').style.display = 'block';
        document.getElementById('totalLines').innerText = extractedData.length;
        document.getElementById('totalFees').innerText = totalFees.toLocaleString();
        document.getElementById('totalTaxes').innerText = totalTaxes.toLocaleString();
        document.getElementById('grandTotal').innerText = grandTotal.toLocaleString();

        const tbody = document.querySelector('#dataTable tbody');
        tbody.innerHTML = '';
        
        extractedData.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${row["رقم المحمول"]}</td>
                <td>${row["رسوم شهرية"]}</td>
                <td>${row["خدمات"]}</td>
                <td>${row["محلي مكالمات"]}</td>
                <td>${row["محلي رسائل"]}</td>
                <td>${row["محلي إنترنت"]}</td>
                <td>${row["دولي مكالمات"]}</td>
                <td>${row["دولي رسائل"]}</td>
                <td>${row["تجوال مكالمات"]}</td>
                <td>${row["تجوال رسائل"]}</td>
                <td>${row["تجوال إنترنت"]}</td>
                <td>${row["تسويات"]}</td>
                <td>${row["ضرائب"]}</td>
                <td style="font-weight:bold">${row["الإجمالي"]}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function exportToExcel() {
        if (extractedData.length === 0) return alert("لا توجد بيانات للتصدير");
        const ws = XLSX.utils.json_to_sheet(extractedData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "الفواتير");
        XLSX.writeFile(wb, "Hawelha_Report.xlsx");
    }
</script>

</body>
</html>
